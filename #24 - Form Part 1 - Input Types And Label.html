<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Book Store</title>
    <meta name="description" content="This Is Our Book Store" />
  </head>
  <body>
    <div>
      <h1>Book Store</h1>
      <p>This Is My Book Store, Welcome</p>
    </div>
    <!-- 
    - form => element creating the whole message structure which accept input from user
    - input -> the typing box itself (actual field accepting input)
        type:
           text -> text  
           password -> ****
           submit -> create a button for sending the input entered inside the field boxes
    - label -> title for input field
    -->
    <form>
      <div>
        <label>Username</label>
        <input type="text">
      </div>
      <br>
      <div>
        <label>Password</label>
        <input type="password">
      </div>
      <input type="submit">
    </form>
  </body>
</html>
