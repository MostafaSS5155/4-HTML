<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Book Store</title>
    <meta name="description" content="This Is Our Book Store" />
  </head>
  <body>
    <h1>Book Store</h1>
    <p>This Is My <b>Book Store</b>, Welcome</p>
    <!--
      ul => Unorderd List -> list with points before items
      li => list Item 
      ol => Ordered List -> list with numebers before items
    -->
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>
        JS
        <ul> <!-- nested list -->
          <li>Angular</li>
          <li>Reactjs</li>
          <li>Vuejs</li>
        </ul>
      </li>
    </ul>
    <!-- Separator -->
    <!-- Attributes of lists
      reversed => Reverse The Ordering of numbers
      start => Start From certin number
      type => Type Of Ordering -> e.g: 1 -> numbers , A -> Capital letters , a -> small letters 
                                       I -> I II III IV V , i -> i ii iii iv v
    -->
     <!-- list item attribute => custom order value for an item -> value=""  -->
    <ol>
      <li value="50">Name</li>
      <li>Address</li>
      <li>Id</li>
    </ol>
    <!-- Separator -->
    <!--
      dl => Description List
      dt => Description list item Term
      dd => Description list item term Description 
    -->
    <dl>
      <dt>HTML</dt>
      <dd>Language Of The Web</dd>
      <dd>The First Lan</dd>
      <dt>CSS</dt>
      <dd>Language Of The Visuals</dd>
    </dl>
  </body>
</html>
