<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Book Store</title>
    <meta name="description" content="This Is Our Book Store" />
  </head>
  <body>
    <h1>Book Store</h1>
    <p>This Is My <b>Book Store</b>, Welcome</p>
    <!--
      caption => table title
      thead => Table Head -> First Header Row
      tbody => Table Body -> Rest of Table Rows
      tfoot => Table Foot -> Last Row
        tr => Table Row
          th => Table Header cell
          td => Table Data cell
    -->
    <table border="1">
      <caption>
        Students Marks
      </caption>
      <thead> <!-- Table Head -->
        <tr> <!-- Table Row -->
          <th>First</th> <!-- Table Header cell -->
          <th>Last</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody> <!-- Table Body -->
        <tr> <!-- Table Row -->
          <td>Osama</td> <!-- Table Data cell -->
          <td>Mohamed</td>
          <td>40</td>
        </tr>
        <tr>
          <td>Osama</td>
          <td>Mohamed</td>
          <td>40</td>
        </tr>
        <tr>
          <td>Osama</td>
          <td>Mohamed</td>
          <td>40</td>
        </tr>
        <tr>
          <td>Osama</td>
          <td>Mohamed</td>
          <td>40</td>
        </tr>
      </tbody>
      <tfoot> <!-- Table Foot -->
        <tr>
          <td colspan="2">Total</td> <!-- Merged 2 cells by typing 'colspan="2"' in one cell & deleting the other cell -->
          <td>160</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
