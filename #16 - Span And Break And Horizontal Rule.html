<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Book Store</title>
    <meta name="description" content="This Is Our Book Store" />
  </head>
  <!-- 
  - Span => inline element : element without any ready CSS templet -> 
        used for: isolating an word from a line or a parag, by putting it in a seperate element 
            to be ready for CSS & JS , Without affecting the whole line or parag
  - br => \n inside a parag -> new line 
  - hr => Block element horozonal line , insert a line between lines &/or parags  
  -->
  <body>
    <h1>Book Store</h1>
    <p>This Is <span>My</span> <b>Book Store</b>, Welcome</p>
    <p>This Is Second Paragraph, <br />Test <br />Test Again</p>
    <hr />
    <p>Second Paragraph</p>
  </body>
</html>
