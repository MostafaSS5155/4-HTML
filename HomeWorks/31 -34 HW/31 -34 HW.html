<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object 1</title>
</head>
<body>
  <form action="" target="_blank" novalidate>

    <div class="search">
      <label for="search">search</label>
      <br>
      <input type="search" name="search" id="search" placeholder="Enter A word for search" autofocus>
    </div>

    <br>

    <div class="upload">
      <label for="upload">upload</label>
      <br>
      <input type="file" name="upload" id="upload" >
    </div>

    <br>

    <div class="url">
      <label for="url">url</label>
      <br>
      <input type="url" name="url" id="url" required>
    </div>

    <br>

    <div class="date">
      <label for="date">date</label>
      <br>
      <input type="date" name="date" id="date" value="1982-10-25">
    </div>

    <br>

    <div class="month">
      <label for="month">month</label>
      <br>
      <input type="month" name="month" id="month" value="1982-10">
    </div>

    <br>

    <input type="reset" value="empty">
    <input type="submit" value="save">


  </form>

<pre>
Hello Line One 
Hello Line Two
Hello Line Three
    Hello Line Four
</pre>

<iframe src="https://elzero.org/" frameborder="0" width="1400" height="800"></iframe>

</body>
</html>
