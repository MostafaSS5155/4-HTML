<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object 1, input fields</title>
</head>
<body>
  <form action="test.py" method="post">

    <div class="Username">
      <label>Username</label>
      <br>
      <input type="text" name="Username" placeholder="Username" required>
    </div>

    <hr>

    <div class="Password">
      <label>Password</label>
      <br>
      <input type="password" name="Password" required>
    </div>

    <hr>

    <div class="Mobile">
      <label>Mobile</label>
      <br>
      <input type="number" name="Mobile" placeholder="Mobile">
    </div>

    <hr>

    <div class="Email">
      <label>Email</label>
      <br>
      <input type="email" name="Email" placeholder="Email" required>
    </div>

    <hr>

    <div class="Subject">
      <label>Subject</label>
      <br>
      <input type="text" name="Subject" placeholder="Subject">
    </div>

    <br>

    <div class="Empty">
      <input type="reset" placeholder="Empty Form">
    </div>

    <br>

    <div class="Save">
      <input type="submit" placeholder="send">
    </div>

    <br>

    <div class="range">
      <input type="range" name="range" min="0" max="100" step="20" placeholder="80">
    </div>


  </form>
</body>
</html>
